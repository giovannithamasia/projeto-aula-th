<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Template</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/usuariolista}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/produtolista}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Produtos</h1>
            <p class="text-secondary mb-0">Lista de produtos cadastrados no sistema.</p>
        </div>

        <a class="btn btn-primary" th:href="@{/produtocadastrar}">Novo produto</a>
    </div>

    <div class="alert alert-success" role="alert" th:if="${mensagemProduto}" th:text="${mensagemProduto}">
        Produto salvo com sucesso!
    </div>

    <div class="alert alert-success" role="alert" th:if="${mensagemAtualizacao}" th:text="${mensagemAtualizacao}">
        Produto atualizado com sucesso!
    </div>

    <div th:if="${NotFound}" class="alert alert-danger" role="alert" th:text="${NotFound}">
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th scope="col">Nome</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Quantidade</th>
                        <th scope="col" class="text-end">Acoes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="produto : ${listaProdutos}">
                        <td th:text="${produto.nome}">bala</td>
                        <td th:text="${produto.descricao}">bala de goma</td>
                        <td th:text="${produto.preco}">10.00</td>
                        <td th:text="${produto.quantidadeEstoque}">10</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/produtoatualizar/{id}(id=${produto.idProduto})}">Editar</a>
                            <button th:data-id="${produto.idProduto}" class="excluir btn btn-sm btn-outline-danger">Excluir</button>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(listaProdutos)}">
                        <td colspan="4" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="/excluir_produto.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
