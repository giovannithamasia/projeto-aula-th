<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atualizar produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Template</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/usuariolista}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/produtolista}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Atualizar Produto</h1>
                    <p class="text-secondary mb-0">Altere os dados do cadastro selecionado.</p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <div th:if="${NotFound}" class="alert alert-danger" role="alert" th:text="${NotFound}">
                    </div>

                    <form th:action="@{/produtoatualizar}" th:object="${produtoAtualizar}" method="post">
                        <input type="hidden" th:field="*{idProduto}">

                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Digite o nome do produto" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro no nome</div>
                        </div>

                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="descricao" th:field="*{descricao}" placeholder="Digite a descricao do produto">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro na descricao</div>
                        </div>

                        <div class="mb-3">
                            <label for="preco" class="form-label">Preço</label>
                            <input type="text" class="form-control" id="preco" th:field="*{preco}" placeholder="Digite o preco do produto" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('preco')}" th:errors="*{preco}">Erro no preço</div>
                        </div>

                        <div class="mb-3">
                            <label for="quantidadeEstoque" class="form-label">Quantidade de Estoque</label>
                            <input type="text" class="form-control" id="quantidadeEstoque" th:field="*{quantidadeEstoque}" placeholder="Digite a quantidade em estoque" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('quantidadeEstoque')}" th:errors="*{quantidadeEstoque}">Erro na quantidade</div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/produtolista}">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
